name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: electron-rare-github-io-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/lab-interactif/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install lab dependencies
        run: npm ci --prefix apps/lab-interactif

      - name: Quality gate
        run: npm run check
